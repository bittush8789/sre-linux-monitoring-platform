# Prometheus Global Configuration File
# Designed for SRE Linux Monitoring Platform

global:
  scrape_interval: 15s     # How frequently to scrape targets (default: 1m)
  evaluation_interval: 15s # How frequently to evaluate alerting rules (default: 1m)
  scrape_timeout: 10s      # Timeout for a single scrape request

  # Attach these labels to any time series or alerts when communicating with
  # external systems (Federation, Alertmanager, etc.)
  external_labels:
    monitor: 'linux-sre-platform'

# Rule files specifies list of files from which alerts and recording rules are loaded.
rule_files:
  - "alerts.yml"

# A scrape configuration containing exactly the endpoints to scrape.
scrape_configs:
  # Job 1: Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Job 2: Linux Host Node Exporter
  # Since Node Exporter runs in 'host' network mode to capture real host metrics,
  # and Prometheus runs in a Docker bridge network, we scrape the host via the gateway.
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
    relabel_configs:
      # Rewrite the instance label to show the actual host name or a friendly name
      - target_label: instance
        replacement: 'linux-target-host'
