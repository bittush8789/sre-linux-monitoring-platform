# Grafana Datasource Provisioning
# Automatically registers the Prometheus container as the default datasource

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus-sre         # Deterministic UID for dashboard binding
    type: prometheus
    access: proxy
    url: http://prometheus:9090  # Resolves to the 'prometheus' service inside the Docker bridge network
    isDefault: true
    editable: true             # Allows the user to inspect/modify it in the UI if needed
    jsonData:
      httpMethod: POST
      timeInterval: 15s        # Matches our Prometheus scraping interval
