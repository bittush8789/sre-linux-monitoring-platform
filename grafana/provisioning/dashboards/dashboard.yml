# Grafana Dashboard Provisioning
# Automatically imports dashboards located in the mapped directory

apiVersion: 1

providers:
  - name: 'Linux Monitoring Platform'
    orgId: 1
    folder: 'SRE Platform'       # Folder name in the Grafana UI
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10     # How often Grafana checks the path for file changes
    options:
      path: /var/lib/grafana/dashboards # Path inside the Grafana container
