# Docker Compose configuration for the SRE Linux Target Host
# Runs only the Node Exporter agent to collect host metrics.
# Centralized Prometheus servers can scrape this node on port 9100.

version: '3.8'

services:
  # Node Exporter: Collects Linux hardware and OS metrics exposed by the kernel.
  # To measure the actual host server, it runs in the host network and PID namespaces.
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave # Mounts host root filesystem read-only to read system statistics
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)`'
    deploy:
      resources:
        limits:
          memory: 128M # Standard resource constraint for telemetry agents
